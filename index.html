<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX CRUZ - Ethereal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'xs': '475px',
                        'tablet': '768px',
                        'ipad': '1024px',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body class="bg-[#0B1D3A] text-white min-h-screen w-full relative selection:bg-white selection:text-[#2C3E50]">

    <!-- ============================================
         HTML STRUCTURE
         ============================================ -->

    <div class="cursor-dot hidden md:block"></div>

        <!-- Logo -->
        <div class="text-xl font-bold tracking-widest uppercase font-['Montserrat'] hover:opacity-70 transition-opacity cursor-pointer" data-hover>
           Alex Cruz
        </div>
        
        <!-- Navigation Links -->
        <div class="hidden md:flex space-x-12 text-sm font-semibold tracking-[0.2em] uppercase text-white">
    
            <!-- Home (Active) -->
            <a href="index.html" 
               class="relative py-2 after:absolute after:left-0 after:bottom-0 after:h-[1px] after:w-full after:bg-white after:scale-x-100 after:origin-left">
              Home
            </a>

            <!-- Work -->
            <a href="work.html" 
               class="relative py-2 after:absolute after:left-0 after:bottom-0 after:h-[1px] after:w-full after:bg-white 
                      after:scale-x-0 after:origin-left after:transition-transform after:duration-300 
                      hover:after:scale-x-100">
              Work
            </a>

            <!-- About -->
            <a href="about.html" 
               class="relative py-2 after:absolute after:left-0 after:bottom-0 after:h-[1px] after:w-full after:bg-white 
                      after:scale-x-0 after:origin-left after:transition-transform after:duration-300 
                      hover:after:scale-x-100">
              About
            </a>

            <!-- Contact -->
            <a href="contact.html" 
               class="relative py-2 after:absolute after:left-0 after:bottom-0 after:h-[1px] after:w-full after:bg-white 
                      after:scale-x-0 after:origin-left after:transition-transform after:duration-300 
                      hover:after:scale-x-100">
              Contact
            </a>
        </div>
        
        <!-- Social Icons -->
        <div class="flex space-x-6 text-white">

            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex flex-col md:flex-row w-full">
        
        <!-- Left Side: Text Content -->
        <div class="w-full md:w-1/2 min-h-screen flex items-center justify-center relative z-10 p-8 md:p-0 pt-20">
            <div class="text-center md:text-left max-w-lg">
                <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4 reveal-text" style="animation-delay: 0.2s;">
                    Night Life
                </h1>
                <p class="text-sm md:text-base font-light tracking-widest uppercase opacity-80 mb-8 reveal-text" style="animation-delay: 0.4s;">
                    FreeStyle Photography
                </p>
                <div class="reveal-text" style="animation-delay: 0.6s;">
                    <a href="work.html" class="btn-primary group px-8 py-3 border border-white/30 rounded-full transition-all hover:border-white inline-block text-center">
                        <span class="text-xs font-bold tracking-widest uppercase">View Works</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Right Side: Image with Interactive Hover -->
        <div class="w-full md:w-1/2 min-h-screen relative overflow-hidden cursor-none" data-hover id="image-container">
            <!-- Overlay Gradient -->
            <div class="absolute inset-0 bg-gradient-to-l from-transparent via-transparent to-[#3A3A3A]/50 z-10 pointer-events-none"></div>
            
            <!-- Image -->
            <img 
                src="ten.jpg" 
                alt="Ethereal Portrait" 
                class="w-full h-full object-cover object-center"
            >
            
            <!-- Floating Badge -->
            <div class="floating-badge absolute bottom-10 right-10 z-20 text-right pointer-events-none">
                <p class="text-xs font-mono tracking-widest uppercase opacity-70">Collection 2026</p>
                <p class="text-lg font-serif italic">Golden Hour</p>
            </div>
        </div>

    </main>

    <!-- More Photos Collection -->
    <section class="main-photo">
        <div class="image-container-box">
            
            <!-- Photo Section 1 -->
            <div class="w-full min-h-screen flex flex-col md:flex-row">
                <!-- LEFT: IMAGE -->
                <div class="w-full md:w-1/2 min-h-[50vh] md:min-h-screen relative overflow-hidden parallax-image cursor-none" data-hover>
                    <img 
                        src="11.jpg" 
                        alt="City"
                        class="w-full h-full object-cover"
                    >
                </div>

                <!-- RIGHT: TEXT -->
                <div class="w-full md:w-1/2 min-h-[50vh] md:min-h-screen flex items-center justify-center md:justify-end px-8 md:px-16">
                    <div class="text-center md:text-right max-w-xl">
                        <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold tracking-tight mb-4">
                            High City
                        </h1>
                        <p class="text-sm md:text-base font-light tracking-widest uppercase opacity-80">
                            Freestyle Photography
                        </p>
                    </div>
                </div>
            </div>

            <!-- Photo Section 2 -->
            <div class="w-full min-h-screen flex flex-col md:flex-row">
                <!-- LEFT: TEXT -->
                <div class="w-full md:w-1/2 min-h-[50vh] md:min-h-screen flex items-center justify-center md:justify-end text-white p-8">
                    <div class="text-center md:text-right max-w-lg">
                        <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-2">
                            Focused Creativity
                        </h1>
                        <p class="text-sm md:text-base font-light tracking-widest uppercase opacity-80">
                            Freestyle Photography
                        </p>
                    </div>
                </div>

                <!-- RIGHT: IMAGE -->
                <div class="w-full md:w-1/2 min-h-[50vh] md:min-h-screen relative overflow-hidden parallax-image cursor-none" data-hover>
                    <img 
                        src="seven.jpg" 
                        alt="City" 
                        class="w-full h-full object-cover"
                    >
                </div>
            </div>

            <!-- Photo Section 3 -->
            <div class="w-full min-h-screen flex flex-col md:flex-row">
                <!-- LEFT: IMAGE -->
                <div class="w-full md:w-1/2 min-h-[50vh] md:min-h-screen relative overflow-hidden parallax-image cursor-none" data-hover>
                    <img 
                        src="eight.jpg" 
                        alt="City" 
                        class="w-full h-full object-cover"
                    >
                </div>

                <!-- RIGHT: TEXT -->
                <div class="w-full md:w-1/2 min-h-[50vh] md:min-h-screen flex items-center justify-center md:justify-end p-8">
                    <div class="text-center md:text-right max-w-lg">
                        <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4">
                            Reflective Harmony
                        </h1>
                        <p class="text-sm md:text-base font-light tracking-widest uppercase opacity-80">
                            Freestyle Photography
                        </p>
                    </div>
                </div>
            </div>
            
        </div>
    </section>

            <p>FreeStyle Photography</p>
        </div>

        <!-- Copyright -->
        <div>
            <p>&copy; 2026 Alex Cruz. All rights reserved.</p>
        </div>
    </footer>

</html>
